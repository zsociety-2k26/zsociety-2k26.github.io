<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zsociety | ONLINE STATS</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --bg: #050508;
            --text: #ffffff;
            --card-bg: rgba(10, 10, 15, 0.6);
            .feature-item {
    transition: 0.3s ease;
    cursor: pointer;
}

.feature-item:hover {
    transform: translateX(8px) scale(1.03);
    background: rgba(255, 255, 255, 0.08);
    box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
    border-left: 3px solid #bc13fe;
}

.feature-item:hover .feature-title {
    text-shadow: 0 0 10px #00f3ff;
}
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000 100%);
        }

        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 50px;
            max-width: 800px;
            width: 90%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.05);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* 🔥 PHOTO DE PROFIL */
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 20px #00f3ff;
            display: block;
            margin: 0 auto 20px auto;
            transition: 0.3s;
        }

        .logo:hover {
            transform: scale(1.1);
        }

        .title-group {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            color: transparent;
        }

        .demo-badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(to right, var(--secondary), #fff);
            -webkit-background-clip: text;
            color: transparent;
        }

        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            text-align: left;
        }

        .feature-item {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .feature-title {
            color: var(--primary);
            font-weight: bold;
        }

        .info-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .stat-val {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--primary);
        }

        .premium-box {
            background: linear-gradient(135deg, rgba(0,243,255,0.1), rgba(188,19,254,0.1));
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .note {
            margin-top: 25px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

    <!-- 🖼️ PHOTO DE PROFIL -->
    <img src="zsociety-PDP.jfif" class="logo">

    <div class="title-group">
        <span class="title">ZSOCIETY</span>
        <span class="demo-badge">OFFICIAL</span>
    </div>

    <div class="features">
        <div class="feature-item"><span class="feature-title">⚡ DISCORD BOT PANEL</span></div>
        <div class="feature-item"><span class="feature-title">🔎 OSINT</span></div>
        <div class="feature-item"><span class="feature-title">🌐 WEB SCANNER</span></div>
        <div class="feature-item"><span class="feature-title">📍 IP LOOKUP</span></div>
    </div>

    <div class="premium-box">
        <div class="info-stats">
            <div>
                <div class="stat-val">4 / 10</div>
                <div class="stat-label">STAFF</div>
            </div>
            <div>
                <div class="stat-val">227</div>
                <div class="stat-label">MEMBRE</div>
            </div>
            <div>
                <div class="stat-val">100%</div>
                <div class="stat-label">SAFE</div>
            </div>
        </div>

        <p>Do like the elites and join the Zsociety right now by clicking below</p>
    </div>

    <div class="btn-group">

        <!-- 🔥 BOUTON MODIFIÉ -->
        <a href="https://beacons.ai/Zsh0p" class="btn btn-primary">
            BUY NOW
        </a>

        <a href="https://discord.gg/wNUKt7Wwx9" class="btn btn-secondary">
            JOIN NOW!
        </a>

    </div>

    <div class="note">
        ZSOCIETY ON TOP 💪 JOIN NOW : discord.gg/wNUKt7Wwx9
    </div>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles-js", {
    particles: {
        number: { value: 80 },
        color: { value: ["#00f3ff", "#bc13fe"] },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3 },
        move: { enable: true, speed: 2 }
    }
});
</script>

</body>
</html>
